appId: com.arc6ai.assistant
productName: Arc6 Assistant
copyright: Copyright © 2025 Arc6AI

directories:
  buildResources: build
  output: release

files:
  - out/**/*

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]

publish:
  provider: github
  owner: arc6ai
  repo: arc6assistant
