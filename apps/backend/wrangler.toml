name = "arc6assistant"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SESSIONS"
id = "32b9d15a04c947f3a8e77676e730eca4"

# [[r2_buckets]]
# binding = "FILES"
# bucket_name = "arc6assistant-files"
# Uncomment after enabling R2 in Cloudflare Dashboard → Storage & Databases → R2

[vars]
# Non-secret configuration
MAX_HISTORY_MESSAGES = "40"
SESSION_TTL_SECONDS = "604800"

# Secrets (set via: wrangler secret put SECRET_NAME)
# OPENAI_API_KEY
# BRAVE_SEARCH_API_KEY
